<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Ayarları</title>
</head>
<body style="text-align: center; font-family: Arial; background: #1a1a1a; color: white; padding-top: 50px;">
    
    <div style="border: 2px solid #ff4444; margin: 20px; padding: 20px; border-radius: 15px;">
        <h2>Kullanıcı: {{ user.username }}</h2>
        
        <p>Şu anki Durum: 
            <span style="font-weight: bold; color: {% if user.is_private %}#ff4444{% else %}#00ff00{% endif %};">
                {% if user.is_private %} 🔒 PROFİL GİZLİ (Anonim Mod) {% else %} 🔓 HERKESE AÇIK {% endif %}
            </span>
        </p>

        <form action="/gizlilik-degistir" method="POST">
            <button type="submit" style="background: #ff4444; color: white; padding: 15px; border: none; border-radius: 10px; font-size: 16px; width: 100%;">
                DURUMU DEĞİŞTİR
            </button>
        </form>
    </div>

    <p style="color: #888;">* Gizli moddayken anonim sohbet edebilirsin.</p>

</body>
</html>
