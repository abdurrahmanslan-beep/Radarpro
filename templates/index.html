<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tatvan Radar - Kontrol</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { border: 2px solid #ff4444; border-radius: 15px; padding: 20px; margin: 10px auto; max-width: 400px; background: #1e1e1e; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-private { background: #f44336; color: white; }
        .btn-anon { background: #2196F3; color: white; }
    </style>
</head>
<body>
    <h1>Radar Kontrol Paneli</h1>
    <div class="card">
        <h3>Hoş geldin, {{ user.username }}</h3>
        
        <p>Profil Durumu: <strong>{% if user.is_private %} 🔒 GİZLİ {% else %} 🔓 AÇIK {% endif %}</strong></p>
        <form action="/ayarlari-guncelle" method="POST">
            <input type="hidden" name="mod" value="gizlilik">
            <button type="submit" class="btn-private">Profil Gizliliğini Değiştir</button>
        </form>

        <p>Sohbet Modu: <strong>{% if user.is_anonymous %} 🎭 ANONİM {% else %} 👤 KİMLİK AÇIK {% endif %}</strong></p>
        <form action="/ayarlari-guncelle" method="POST">
            <input type="hidden" name="mod" value="anonim">
            <button type="submit" class="btn-anon">Anonim Modu Aç/Kapat</button>
        </form>
    </div>
</body>
</html>
